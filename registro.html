<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - F5Flix</title>

    <link rel="stylesheet" href="m4play.css">
    <link rel="icon" type="image/png" href="src/images/logo.png">
</head>

<body>


    <header class="header">
          <nav class="navbar" aria-label="Navegación principal">


            <a href="index.html" class="logo">
                <img src="src/images/F5-Logo.png" alt="F5Flix logo">
            </a>


            <ul class="nav-list" id="nav-list">

                <li class="nav-item">
                    <a href="index.html" class="nav-link">PELÍCULAS</a>
                </li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">SERIES</a>
                </li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">LO MÁS VISTO</a>
                </li>
                <li class="nav-item">
                    <a href="registro.html" class="nav-link">DATE DE ALTA</a>
                </li>
                <li class="nav-item">
                    <a href="contacto.html" class="nav-link">CONTACTO</a>
                </li>
            </ul>


            <div class="user-actions" aria-label="Acciones de usuario">


                <a href="pages/login.html" aria-label="Iniciar sesión">
                    <img src="src/images/user-regular.svg" alt="Iniciar sesión">
                </a>


            </div>

        </nav>
    </header>

    <main>

        <section class="registro">

            <h1>Registro de usuario</h1>

            <form action="#" method="GET" class="formulario">

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad">
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha de registro</label>
                    <input type="date" id="fecha" name="fecha">
                </div>

                <div class="form-group">
                    <p>Género favorito</p>

                    <label><input type="radio" name="genero" value="accion"> Acción</label>
                    <label><input type="radio" name="genero" value="drama"> Drama</label>
                    <label><input type="radio" name="genero" value="comedia"> Comedia</label>
                </div>

                <div class="form-group">
                    <p>Preferencias</p>

                    <label><input type="checkbox" name="pref" value="peliculas"> Películas</label>
                    <label><input type="checkbox" name="pref" value="series"> Series</label>
                    <label><input type="checkbox" name="pref" value="documentales"> Documentales</label>
                </div>

                <div class="form-group">
                    <label for="pais">País</label>
                    <select id="pais" name="pais">
                        <option value="">Selecciona</option>
                        <option value="espana">España</option>
                        <option value="mexico">México</option>
                        <option value="argentina">Argentina</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="comentarios">Comentarios</label>
                    <textarea id="comentarios" name="comentarios"></textarea>
                </div>

                <button type="submit" class="btn">Registrarse</button>

            </form>

        </section>

    </main>


    <footer>
        <p>© 2026 F5Flix by Ruddy Pamela Cruz Campoverde</p>
    </footer>

</body>

</html>
